        <style>
            @keyframes scanMove {
                0%   { transform: translateY(0); }
                100% { transform: translateY(4px); }
            }
        </style>

    <body class="solidBackground">

        <!-- Glitch banner with animated scanlines -->
        <div id="glitch-top"
             style="
                font-family: monospace;
                font-size: 22px;
                padding: 10px;
                color: #00ffea;
                position: relative;
                overflow: hidden;
                white-space: pre;
             ">
            <span id="glitch-text"></span>

            <div id="scanlines"
                 style="
                    position:absolute;
                    top:0; left:0;
                    width:100%; height:100%;
                    pointer-events:none;
                    background: repeating-linear-gradient(
                        to bottom,
                        rgba(0,0,0,0) 0px,
                        rgba(0,0,0,0) 2px,
                        rgba(0,0,0,0.15) 3px
                    );
                    mix-blend-mode: multiply;
                    animation: scanMove 6s linear infinite;
                 ">
            </div>
        </div>

        <section id="boot_screen"></section>

        <script>
            const target = "edex-revival wellcomes you";
            const chars = "!@#$%^&*()_+-=[]{}<>?/\\|~abcdefghijklmnopqrstuvwxyz0123456789";
            let i = 0;

            const box = document.getElementById("glitch-text");

            const glitch = setInterval(() => {
                const out = target
                    .split("")
                    .map((c, idx) => idx < i ? c : chars[Math.floor(Math.random()*chars.length)])
                    .join("");

                box.textContent = out;

                if (i >= target.length) clearInterval(glitch);
                i++;
            }, 80);
        </script>

        <script src="_renderer.js"></script>
    </body>
